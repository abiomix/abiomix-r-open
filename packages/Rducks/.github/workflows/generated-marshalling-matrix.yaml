name: Generated direct/quack marshalling matrix

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      max_cases:
        description: "Maximum generated cases to run; 0 means all"
        required: false
        default: "0"
  schedule:
    - cron: "17 3 * * 1"

jobs:
  generated-marshalling-matrix:
    runs-on: ubuntu-latest
    name: R ${{ matrix.r }} generated direct/quack matrix
    strategy:
      fail-fast: false
      matrix:
        r: ['release', '4.3']
    env:
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
      RDUCKS_DEV_SURFACES: "true"
      RDUCKS_MATRIX_MAX: ${{ github.event.inputs.max_cases || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r }}
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        env:
          GITHUB_PAT: ${{ github.token }}
        run: |
          install.packages(c("DBI", "duckdb", "mirai", "nanonext", "S7", "tinytest"))
        shell: Rscript {0}

      - name: Install Rducks
        run: R CMD INSTALL --preclean .

      - name: Run generated direct/quack marshalling matrix
        run: Rscript tools/run_generated_marshalling_matrix.R
