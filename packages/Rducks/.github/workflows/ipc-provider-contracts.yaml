name: IPC provider contracts

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions: read-all

jobs:
  provider-contracts:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    name: ${{ matrix.os }} provider contracts
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
      RDUCKS_DEV_SURFACES: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Quack codec sources stay in sync
        if: runner.os == 'Linux'
        run: |
          cmp src/quack_core.c tools/ext/src/quack_core.c
          cmp src/quack_core.h tools/ext/src/quack_core.h
        shell: bash

      - name: Restore script execute bits on Windows
        if: runner.os == 'Windows'
        run: chmod +x configure cleanup configure.win cleanup.win
        shell: bash

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("DBI", "duckdb", "globals", "mirai", "mori", "nanonext", "S7", "tinytest"))
        shell: Rscript {0}

      - name: Install Rducks
        run: R CMD INSTALL --preclean .
        shell: bash

      - name: Run focused provider contract tests
        run: |
          # run_test_file() prints failures but still returns normally, so the
          # results must be inspected explicitly or a failing test would pass CI.
          files <- c(
            "inst/tinytest/test_dependencies.R",
            "inst/tinytest/test_execution_plan.R",
            "inst/tinytest/test_quack_codec_roundtrip.R",
            "inst/tinytest/test_direct_scalar.R",
            "inst/tinytest/test_wire_support_contract.R",
            "inst/tinytest/test_quack_malformed.R"
          )
          ok <- TRUE
          for (f in files) {
            res <- tinytest::run_test_file(f)
            print(res)
            if (!all(vapply(res, isTRUE, logical(1)))) ok <- FALSE
          }
          if (!ok) stop("focused provider contract tests failed")
        shell: Rscript {0}

      - name: Run worker-process ipc tests (all advertised wire types + external malformed)
        if: runner.os == 'Linux'
        env:
          RDUCKS_RUN_IPC_TESTS: "true"
        run: |
          files <- c(
            "inst/tinytest/test_ipc_roundtrip.R",
            "inst/tinytest/test_ipc_external_malformed.R"
          )
          ok <- TRUE
          for (f in files) {
            res <- tinytest::run_test_file(f)
            print(res)
            if (!all(vapply(res, isTRUE, logical(1)))) ok <- FALSE
          }
          if (!ok) stop("worker-process ipc tests failed")
        shell: Rscript {0}
