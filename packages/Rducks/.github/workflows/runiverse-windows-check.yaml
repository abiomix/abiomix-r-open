name: R-universe Windows check mimic

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      r_version:
        description: "R version to mimic"
        required: false
        default: "release"
        type: choice
        options:
          - oldrel
          - release
          - devel

permissions: read-all

jobs:
  source-package:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: build

      - name: Build source package
        run: R CMD build .

      - name: Upload source package
        uses: actions/upload-artifact@v4
        with:
          name: package-source
          path: Rducks_*.tar.gz
          if-no-files-found: error

  runiverse-windows-check:
    needs: source-package
    runs-on: windows-latest
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        r-version: ${{ fromJSON(github.event_name == 'workflow_dispatch' && format('["{0}"]', inputs.r_version) || '["release","devel"]') }}
    name: Windows ${{ matrix.r-version }}
    env:
      UNIVERSE_NAME: sounkou-bioinfo
      MY_UNIVERSE: https://sounkou-bioinfo.r-universe.dev
      CRAN_VERSION: ""
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
    steps:
      - uses: r-universe-org/actions/setup-r@v12
        with:
          r-version: ${{ matrix.r-version }}

      - uses: r-universe-org/actions/windows-prep@v12

      - name: Locate source package
        id: sourcepkg
        shell: bash
        run: |
          set -euo pipefail
          srcpkg="$(ls Rducks_*.tar.gz | head -n 1)"
          echo "sourcepkg=${srcpkg}" >> "$GITHUB_OUTPUT"
          ls -lh "${srcpkg}"

      - uses: r-universe-org/actions/windows-deps@v12
        with:
          sourcepkg: ${{ steps.sourcepkg.outputs.sourcepkg }}

      - uses: r-universe-org/actions/windows-build@v12
        with:
          sourcepkg: ${{ steps.sourcepkg.outputs.sourcepkg }}

      - name: R-universe Windows check
        id: runiverse-check
        uses: r-universe-org/actions/windows-check@v12
        timeout-minutes: 20
        with:
          sourcepkg: ${{ steps.sourcepkg.outputs.sourcepkg }}
          checkargs: --no-manual --no-vignettes

      - name: Show check outputs and R processes
        if: always()
        shell: pwsh
        run: |
          Write-Host "== R CMD check outputs =="
          Get-ChildItem -Recurse -File -Include *.Rout,*.Rout.fail,*.fail,install.log,00check.log |
            ForEach-Object {
              Write-Host "::group::$($_.FullName)"
              Get-Content $_.FullName -Tail 1000 -ErrorAction SilentlyContinue
              Write-Host "::endgroup::"
            }
          Write-Host "== Remaining R processes =="
          Get-Process R,Rterm -ErrorAction SilentlyContinue |
            Select-Object Id, ProcessName, Path, StartTime |
            Format-List

      - name: Upload check artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runiverse-windows-${{ matrix.r-version }}-check-artifacts
          path: |
            *.log
            *.Rcheck
          if-no-files-found: ignore
