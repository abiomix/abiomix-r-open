name: Concurrency stress

on:
  workflow_dispatch:
    inputs:
      duckdb_threads:
        description: "DuckDB/external thread count for stress tests"
        required: false
        default: "8"
      ipc_workers:
        description: "NNG worker count for multiprocess tests"
        required: false
        default: "2"
  schedule:
    - cron: "41 4 * * 2"

jobs:
  concurrency-stress:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
      RDUCKS_DEV_SURFACES: "true"
      RDUCKS_STRESS_CONCURRENCY: "true"
      RDUCKS_TEST_DUCKDB_THREADS: ${{ github.event.inputs.duckdb_threads || '8' }}
      RDUCKS_TEST_IPC_WORKERS: ${{ github.event.inputs.ipc_workers || '2' }}
    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R dependencies
        run: |
          install.packages(c("DBI", "duckdb", "mirai", "nanonext", "S7", "tinytest"))
        shell: Rscript {0}

      - name: Build and install Rducks
        run: |
          pkg <- read.dcf("DESCRIPTION", fields = c("Package", "Version"))
          tarball <- sprintf("%s_%s.tar.gz", pkg[1, "Package"], pkg[1, "Version"])
          status <- system2("R", c("CMD", "build", "--no-build-vignettes", "."))
          if (!identical(status, 0L)) quit(status = status)
          lib <- tempfile("rducks-lib-")
          dir.create(lib)
          writeLines(lib, ".rducks-test-lib")
          status <- system2("R", c("CMD", "INSTALL", "-l", lib, tarball))
          if (!identical(status, 0L)) quit(status = status)
        shell: Rscript {0}

      - name: Run focused concurrency stress tests
        run: |
          lib <- readLines(".rducks-test-lib", warn = FALSE)
          .libPaths(c(lib, .libPaths()))
          library(Rducks)
          tinytest::run_test_file("inst/tinytest/test_duckdb_runtime_concurrent_queue.R")
          tinytest::run_test_file("inst/tinytest/test_zzzy_duckdb_runtime_nng_transports.R")
        shell: Rscript {0}
