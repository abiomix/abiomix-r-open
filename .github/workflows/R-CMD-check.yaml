# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

name: R-CMD-check.yaml

permissions: read-all

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 35

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          # R-devel coverage lives in fedora-cran-check.yaml, where pak can use
          # the CRAN-like Fedora/R-devel binary resolver for heavy dependencies
          # such as duckdb. Ubuntu R-devel builds duckdb from source and times
          # out before package checking starts.
          - {os: ubuntu-latest,   r: 'release'}
          - {os: ubuntu-latest,   r: '4.3'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      USE_UNSTABLE_C_API: "1"
      RDUCKS_EXTENSION_ABI_TYPE: C_STRUCT_UNSTABLE
      RDUCKS_DEV_SURFACES: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Restore script execute bits on Windows
        if: runner.os == 'Windows'
        run: chmod +x configure cleanup configure.win cleanup.win
        shell: bash

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: |
            any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'

      - name: Show tinytest output on failure
        if: failure()
        shell: bash
        run: |
          echo ::group::Show tinytest output
          find check -name 'tinytest.Rout*' -exec cat '{}' \; || true
          echo ::endgroup::
